<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Faltam quantos dias mesmo?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f4f4f4;
    }

    h1 {
      font-size: 40px;
    }

    #contador {
      font-size: 80px;
      font-weight: bold;
      color: rgb(255, 128, 5);
    }
  </style>
</head>
<body>

<h1>Faltam</h1>
<div id="contador"></div>
<h1>dias para a Technovação Robótica</h1>

<script>
  // Abril = 3 (mês começa em 0)
  const dataRSM = new Date(2026, 4, 21);

  function atualizar() {
    const agora = new Date();

    const diff = dataRSM - agora;

    // cálculo de dias (evita número negativo)
    const dias = Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));

    document.getElementById("contador").innerText = dias;
  }

  // roda imediatamente
  atualizar();

  // atualiza automaticamente a cada segundo
  setInterval(atualizar, 1000);
</script>

</body>
</html>
